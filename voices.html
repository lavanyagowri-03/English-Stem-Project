<!DOCTYPE html>
<html>
<head>
<title>Active & Passive Voice Quiz</title>
<style>
body {margin:0;font-family:Arial;background:linear-gradient(120deg,#ff9a9e,#fad0c4);}
.container {display:flex;height:100vh;}
.left {width:65%;padding:30px;}
.right {width:35%;background:white;padding:20px;overflow-y:auto;}
.quiz-box {background:white;padding:25px;border-radius:15px;box-shadow:0 0 20px rgba(0,0,0,0.3);}
button {padding:10px 15px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
.option-btn {background:#e84393;color:white;}
.option-btn:hover {background:#d63031;}
.nav-btn {background:#00b894;color:white;}
.correct {color:green;}
.wrong {color:red;}
</style>
</head>

<body>

<div class="container">

<div class="left">
<div class="quiz-box">
<h2>📘 Active & Passive Voice Quiz</h2>
<div id="questionBox"></div>
<div id="feedback"></div>

<button class="nav-btn" onclick="prevQuestion()">Previous</button>
<button class="nav-btn" onclick="nextQuestion()">Next</button>

<h3 id="score"></h3>
</div>
</div>

<div class="right">
<h3>📝 Answer Review</h3>
<div id="reviewBox"></div>
</div>

</div>

<script>

const questions = [

{"question": "Ram writes a letter.",
 "options": ["A letter is written by Ram.", "A letter was written by Ram."],
 "answer": 0},

{"question": "She is singing a song.",
 "options": ["A song is being sung by her.", "A song was being sung by her."],
 "answer": 0},

{"question": "They completed the project.",
 "options": ["The project was completed by them.", "The project is completed by them."],
 "answer": 0},

{"question": "He will finish the work.",
 "options": ["The work will be finished by him.", "The work is finished by him."],
 "answer": 0},

{"question": "The teacher teaches English.",
 "options": ["English is taught by the teacher.", "English was taught by the teacher."],
 "answer": 0},

{"question": "She has cleaned the room.",
 "options": ["The room has been cleaned by her.", "The room was cleaned by her."],
 "answer": 0},

{"question": "They are watching a movie.",
 "options": ["A movie is being watched by them.", "A movie was watched by them."],
 "answer": 0},

{"question": "The chef cooked the meal.",
 "options": ["The meal was cooked by the chef.", "The meal is cooked by the chef."],
 "answer": 0},

{"question": "He can solve the problem.",
 "options": ["The problem can be solved by him.", "The problem was solved by him."],
 "answer": 0},

{"question": "The company launched a new product.",
 "options": ["A new product was launched by the company.", "A new product is launched by the company."],
 "answer": 0},

{"question": "She was reading a book.",
 "options": ["A book was being read by her.", "A book is being read by her."],
 "answer": 0},

{"question": "They will organize the event.",
 "options": ["The event will be organized by them.", "The event was organized by them."],
 "answer": 0},

{"question": "The police arrested the thief.",
 "options": ["The thief was arrested by the police.", "The thief is arrested by the police."],
 "answer": 0},

{"question": "He is repairing the car.",
 "options": ["The car is being repaired by him.", "The car was repaired by him."],
 "answer": 0},

{"question": "She wrote a poem.",
 "options": ["A poem was written by her.", "A poem is written by her."],
 "answer": 0},

{"question": "They have finished the homework.",
 "options": ["The homework has been finished by them.", "The homework was finished by them."],
 "answer": 0},

{"question": "The manager approved the plan.",
 "options": ["The plan was approved by the manager.", "The plan is approved by the manager."],
 "answer": 0},

{"question": "He is delivering the parcel.",
 "options": ["The parcel is being delivered by him.", "The parcel was delivered by him."],
 "answer": 0},

{"question": "She will buy a car.",
 "options": ["A car will be bought by her.", "A car was bought by her."],
 "answer": 0},

{"question": "They built a bridge.",
 "options": ["A bridge was built by them.", "A bridge is built by them."],
 "answer": 0}

];

let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function loadQuestion(){
    const q = questions[current];
    let html = `<p><b>Question ${current+1} of ${questions.length}</b></p>`;
    html += `<p>${q.question}</p>`;
    q.options.forEach((opt,i)=>{
        html += `<button class="option-btn" onclick="selectAnswer(${i})">${opt}</button><br><br>`;
    });
    document.getElementById("questionBox").innerHTML = html;
    document.getElementById("feedback").innerHTML = "";
}

function selectAnswer(choice){
    userAnswers[current]=choice;
    const correct = questions[current].answer;

    if(choice===correct){
        document.getElementById("feedback").innerHTML="<p class='correct'>✔ Correct!</p>";
    }else{
        document.getElementById("feedback").innerHTML=
        "<p class='wrong'>❌ Wrong!</p><p class='correct'>Correct Answer: "+
        questions[current].options[correct]+"</p>";
    }

    updateReview();
}

function updateReview(){
    let review="";
    questions.forEach((q,i)=>{
        if(userAnswers[i]!==null){
            review += userAnswers[i]===q.answer ?
            `<p class='correct'>Q${i+1}: ✔</p>` :
            `<p class='wrong'>Q${i+1}: ❌</p>`;
        }
    });

    document.getElementById("reviewBox").innerHTML = review;

    let score = userAnswers.filter((a,i)=>a===questions[i].answer).length;
    document.getElementById("score").innerHTML = "🎯 Score: " + score + " / " + questions.length;
}

function nextQuestion(){ if(current<questions.length-1){ current++; loadQuestion(); } }
function prevQuestion(){ if(current>0){ current--; loadQuestion(); } }

loadQuestion();

</script>

</body>
</html>
